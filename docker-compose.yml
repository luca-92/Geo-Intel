services:
  db:
    image: postgres:16-alpine
    container_name: geo_intel_db
    environment:
      POSTGRES_DB: geo_intel
      POSTGRES_USER: geo_user
      POSTGRES_PASSWORD: geo_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geo_user -d geo_intel"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    container_name: geo_intel_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://geo_user:geo_password@db:5432/geo_intel
      CORS_ORIGINS: http://localhost:3000
      NOCODB_BASE_URL: ${NOCODB_BASE_URL:-}
      NOCODB_API_TOKEN: ${NOCODB_API_TOKEN:-}
      NOCODB_BASE_ID: ${NOCODB_BASE_ID:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: geo_intel_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  backend_uploads:
